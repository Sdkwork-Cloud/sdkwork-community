name: Governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: community-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Standards Alignment
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Prepare SDKWork source dependencies
        env:
          SDKWORK_RELEASE_TOKEN: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}
        run: pnpm run workflow:prepare-ci-dependencies

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify standards alignment
        run: pnpm verify
